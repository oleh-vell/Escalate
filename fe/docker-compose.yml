services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rentoleh
      POSTGRES_PASSWORD: rentoleh
      POSTGRES_DB: rentoleh
    # 5432 on this machine is taken by another project's postgres
    ports:
      - "5433:5432"
    volumes:
      - rentoleh-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  rentoleh-pgdata:
